# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Build documentation in the "docs/" directory with Sphinx
sphinx:
  configuration: docs/conf.py

build:
  os: ubuntu-22.04
  tools:
    python: "3.13"
    nodejs: "24"
    rust: "1.96"
  jobs:
    pre_install:
      - python -m pip install pdm
    install:
      - npm --prefix js/ ci
      - VIRTUAL_ENV=$(dirname $(dirname $(which python))) pdm install --with docs --with dev
      - VIRTUAL_ENV=$(dirname $(dirname $(which python))) pdm run python -m ensurepip
      - VIRTUAL_ENV=$(dirname $(dirname $(which python))) pdm run python -m pip install ./packages/noob-core
    pre_build:
      - VIRTUAL_ENV=$(dirname $(dirname $(which python))) pdm run docs-build-js