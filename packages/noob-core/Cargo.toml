[package]
name = "noob-core"
version = "0.1.0"
edition = "2021"
description = "Optimized rust core for the noob scheduler"
license = "MIT"

[lib]
name = "noob_core"
crate-type = ["cdylib", "rlib"]

[dependencies]
pyo3 = { version = "0.29", features = ["abi3-py311"] }
indexmap = "2"
rustc-hash = "2"

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "toposort"
harness = false

[profile.release]
lto = true
codegen-units = 1

[lints.clippy]
semicolon_if_nothing_returned = "warn"
trivially_copy_pass_by_ref = "warn"
let_underscore_must_use = "warn"
unused_result_ok = "warn"
len_zero = "warn"

[lints.rust]
unused_must_use = "deny"