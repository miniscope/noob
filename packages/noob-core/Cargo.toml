[package]
name = "noob-core"
version = "0.1.0"
edition = "2021"
description = "Optimized rust core for the noob scheduler"
license = "MIT"

[lib]
name = "noob_core"
crate-type = ["cdylib", "rlib"]

[dependencies]
pyo3 = { version = "0.29", features = ["abi3-py311"] }
indexmap = "2"
uuid = { version = "1", features = ["v4"] }

[profile.release]
lto = true
codegen-units = 1