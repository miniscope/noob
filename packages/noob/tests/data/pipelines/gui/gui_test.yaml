noob_id: testing-gui
noob_model: noob.tube.TubeSpecification
noob_version: 0.0.1
description: |
  A tube with all the different stuff we need to handle in the GUI.
  Doesn't do anything useful, just for the purposes of having a complex thing to look at while working on the gui.

input:
  number_tube:
    type: int
    scope: tube
  number_process:
    type: int
    scope: process
  image_path:
    type: pathlib.Path
    scope: process
  video_path:
    type: pathlib.Path
    scope: tube

nodes:
  count:
    type: noob.testing.count_source
    depends:
      - start: input.number_tube
    params:
      limit: 0
  count_higher:
    type: noob.testing.count_source
    params:
      start: 5
      limit: 0
  word:
    type: noob.testing.sporadic_word
  letters:
    type: map
    depends:
      - value: word.word
  gather_word:
    type: gather
    depends:
      - n: letters.n
      - value: letters.value
  letter:
    type: noob.testing.letter_source
  multiply:
    type: noob.testing.multiply
    depends:
      - left: count.index
  divide:
    type: noob.testing.divide
    depends:
      - numerator: count.index
      - denominator: count_higher.index
  gather_n:
    type: gather
    params:
      n: 5
    depends:
      - value: letter.letter

  letter_pair:
    type: noob.testing.multi_concat
    depends:
      - first: letter.letter
      - second: letters.value

  frame:
    type: tube
    params:
      tube: testing-gui-child-1
    depends:
      - image_path: input.image_path

  write:
    type: tube
    params:
      tube: testing-gui-child-2

    depends:
      - path: input.video_path
      - frame: frame.frame

  return:
    type: return
    depends:
      - multiply: multiply.value
      - divide: divide.ratio
      - gather_n: gather_n.value
      - gather_word: gather_word.value
