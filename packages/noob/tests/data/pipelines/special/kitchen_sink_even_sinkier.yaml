noob_id: testing-kitchen-sink-even-sinkier
noob_model: noob.tube.TubeSpecification
noob_version: 0.0.1
description: |
  One of every graph feature:
  stateful generator sources, plain required deps, optional slots,
  sporadic NoEvent emission (switch), map -> subepochs -> gather (map mode),
  and gather across epochs (n mode).

nodes:
  count:
    type: noob.testing.count_source
    params:
      limit: 0
  count_higher:
    type: noob.testing.count_source
    params:
      start: 5
      limit: 0
  word:
    type: noob.testing.sporadic_word
  letter:
    type: noob.testing.letter_source
  multiply:
    type: noob.testing.multiply
    depends:
      - left: count.index
  divide:
    type: noob.testing.divide
    depends:
      - numerator: count.index
      - denominator: count_higher.index

  gather_n:
    type: gather
    params:
      n: 5
    depends:
      - value: letter.letter

  # map/gather: switch.fruits (a word 1 of 3 epochs, NoEvent otherwise)
  # fans out per-letter into subepochs, which the map-mode gather
  # collapses back into the parent epoch
  switch:
    type: noob.testing.switch
  mapped:
    type: map
    depends:
      - value: switch.fruits
  shout:
    type: noob.testing.exclaim
    depends:
      - string: mapped.value
  regroup:
    type: gather
    depends:
      - value: shout.value
      - n: mapped.n
  reword:
    type: noob.testing.concat
    depends:
      - strings: regroup.value

  # optional slots: every dependency edge into this node is optional,
  # and the_other is missing whenever word emitted NoEvent upstream
  pick:
    type: noob.testing.this_or_that
    depends:
      - this: multiply.value
      - that: divide.ratio
      - the_other: reword.value

  return:
    type: return
    depends:
      - multiply: multiply.value
      - divide: divide.ratio
      - gather_n: gather_n.value
      - reword: reword.value
      - pick: pick.value
