name: Nobes Tests

on:
  push:
    branches:
      - main
  pull_request:

# restrict GITHUB_ACTIONS token (implicitly sets all other permissions to none)
permissions:
  contents: read

jobs:
  list-nobes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: set-matrix
        run: |
          find ./packages -type d -name "nobes-*" -exec basename {} \;
          echo "---"
          find ./packages -type d -name "nobes-*" -exec basename {} \; | jq -R -s -c 'split("\n")[:-1]'
          echo "---"
          NOBES_PKGS=$(find ./packages -type d -name "nobes-*" -exec basename {} \; | jq -R -s -c 'split("\n")[:-1]')
          echo $NOBES_PKGS
          echo "matrix=$NOBES_PKGS" >> $GITHUB_OUTPUT
  test-nobes:
    needs: list-nobes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
        package: ${{ fromJson(needs.list-nobes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Cache venv
        uses: actions/cache@v5
        with:
          key: ${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pylock.toml') }}
          path: '.venv'
      - name: Install dependencies
        run: |
          python -m pip install pdm
          pdm install
      - name: Run Pre-test script
        run: |
          if [ -f packages/${{ matrix.package }}/scripts/pretest.sh  ]; then
            bash packages/${{ matrix.package }}/scripts/pretest.sh
          fi
      - name: Run Tests
        timeout-minutes: 5
        env:
          NOOB_LOGS__WIDTH: 140
        run: |
          pdm run pytest packages/${{ matrix.package }}
