name: Lint

on:
  push:
    branches:
      - main
  pull_request:


permissions:
  contents: read

jobs:
  ruff:
    name: ruff linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: astral-sh/ruff-action@v3

  black:
    name: black formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: psf/black@stable

  lock:
    name: lockfile current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: install pdm
        run: python -m pip install pdm
      - name: check lockfile
        run: pdm lock --check --with :all

    # fixme - once noob-core is on pypi, install from there rather than building
  build-core:
    runs-on: "ubuntu-latest"

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        id: toolchain
      - name: Restore built wheel
        id: wheel-cache
        uses: actions/cache@v4
        with:
          path: packages/noob-core/dist
          key: core-wheel-${{ steps.toolchain.outputs.cachekey }}-${{ hashFiles('packages/noob-core/src/**', 'packages/noob-core/python/**', 'packages/noob-core/Cargo.toml', 'packages/noob-core/Cargo.lock', 'packages/noob-core/pyproject.toml') }}
      - uses: Swatinem/rust-cache@v2
        if: steps.wheel-cache.outputs.cache-hit != 'true'
        with:
          workspaces: packages/noob-core
      - name: Build wheel
        if: steps.wheel-cache.outputs.cache-hit != 'true'
        run: pipx run maturin build --release --out dist
        working-directory: packages/noob-core

      - uses: actions/upload-artifact@v5
        with:
          name: core-wheel-ubuntu-latest
          path: packages/noob-core/dist

  mypy:
    runs-on: ubuntu-latest
    needs: [build-core]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            .venv
            __pypackages__
          key: ${{ hashFiles('pdm.lock', 'pyproject.toml') }}
      - name: Install deps
        run: |
          pip install pdm
          pdm install
      - uses: actions/download-artifact@v6
        with:
          name: core-wheel-ubuntu-latest
          path: core-dist
      - name: Install repo-built noob-core
        run: |
          pdm run python -m ensurepip
          pdm run python -m pip install --no-index --find-links core-dist noob-core
      - name: Mypy type checking
        run: pdm run mypy

  schema:
    name: JSON schemas current
    runs-on: ubuntu-latest
    needs: [build-core]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: install pdm & deps
        run: |
          python -m pip install pdm
          pdm install
      - uses: actions/download-artifact@v6
        with:
          name: core-wheel-ubuntu-latest
          path: core-dist
      - name: Install repo-built noob-core
        run: |
          pdm run python -m ensurepip
          pdm run python -m pip install --no-index --find-links core-dist noob-core
      - name: generate schemas
        run: pdm run render_schema
      - name: check schemas
        run: |
          if [[ -n $(git status ./schema --porcelain) ]]; then
              git diff
              echo "Regenerate the schema with pdm run render_schema" >> "$GITHUB_STEP_SUMMARY"
              exit 1
          fi

