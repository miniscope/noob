name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-core:
    strategy:
      matrix:
        platform: [ "ubuntu-latest", "macos-latest", "windows-latest" ]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        id: toolchain

      - name: Restore built wheel
        id: wheel-cache
        uses: actions/cache@v4
        with:
          path: packages/noob-core/dist
          key: core-wheel-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.cachekey }}-${{ hashFiles('packages/noob-core/src/**', 'packages/noob-core/python/**', 'packages/noob-core/Cargo.toml', 'packages/noob-core/Cargo.lock', 'packages/noob-core/pyproject.toml') }}
      - uses: Swatinem/rust-cache@v2
        if: steps.wheel-cache.outputs.cache-hit != 'true'
        with:
          workspaces: packages/noob-core
      - name: Build wheel
        if: steps.wheel-cache.outputs.cache-hit != 'true'
        run: pipx run maturin build --release --out dist
        working-directory: packages/noob-core

      - uses: actions/upload-artifact@v5
        with:
          name: core-wheel-${{ matrix.platform }}
          path: packages/noob-core/dist

  test:
    name: pytest
    needs: build-core
    strategy:
      fail-fast: false
      matrix:
        platform: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install pdm coverage
          pdm install

      - uses: actions/download-artifact@v6
        with:
          name: core-wheel-${{ matrix.platform }}
          path: core-dist

      - name: Install repo-built noob-core
        run: pdm run python -m pip install --no-index --find-links core-dist noob-core

      - name: Assert core came from the repo wheel
        run: pdm run python -c "import noob_core; print(noob_core.__file__)"

      - name: Run Tests
        run: pdm run test
        timeout-minutes: 5
        env:
          NOOB_LOGS__WIDTH: 140

      - name: Trust Coveralls Homebrew tap (Homebrew 6 requirement)
        if: runner.os == 'macOS'
        run: brew trust coverallsapp/coveralls

      - name: Coveralls Parallel
        uses: coverallsapp/github-action@v2
        continue-on-error: true
        with:
          flag-name: run-${{ join(matrix.*, '-') }}
          parallel: true

  finish-coverage:
    needs: test
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2.3.6
        with:
          parallel-finished: true
