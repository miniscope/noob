noob_id: http-scrape
noob_model: noob.tube.TubeSpecification
noob_version: 0.0.1
description: |
  Recursively scrape a webpage, saving all the visited HTML pages to files,
  and then extracting links from the page for further scraping.
  
  Demonstrates the use of runner-scoped assets with dependencies for preserving data between epochs

input:
  root_url:   {type: str, scope: tube}
  output_dir: {type: pathlib.Path, scope: tube}

assets:
  seen:   {type: set, scope: runner, depends: update_seen_urls.value}
  todo:   {type: set, scope: runner, params: [[input.root_url]], depends: gather_urls.value}
  client: {type: nobes.web.AsyncHttpxClient, scope: process}

nodes:
  filter:      {type: nobes.core.difference,depends: [assets.todo, assets.seen]}
  map_urls:    {type: map,                  depends: [value: filter.value]}
  get_page:    {type: nobes.web.get_url,    depends: [url: map_urls.value, client: assets.client]}
  print:       {type: print,                depends: [get_page.url]}
  save_page:   {type: nobes.web.write_html, depends: [response: get_page.response, directory: input.output_dir]}

  ## get the next generation of urls to grab
  extract_urls: {type: nobes.web.extract_tags,
                 params: {tag: "a", attribute: "href"},
                 depends: [page: get_page.response]}

  # duck into a sub-subepoch to absolutize the urls
  extracted:    {type: map,    depends: [extract_urls.value]}
  absolute_url: {type: urllib.parse.urljoin, depends: [map_urls.value, extracted.value]}
  gather_lower: {type: gather, depends: [n: extracted.n, value: absolute_url.value]}

  # now back up to the top epoch
  gather_urls:  {type:    gather,
                 params:  {flatten: true},
                 depends: [n: map_urls.n, value: gather_lower.value]}

  ## keep track of what we've seen
  update_seen_urls: {type: nobes.core.update, depends: [assets.seen, filter.value]}


